# AliDNS RAM credentials.
#
# For a ClusterIssuer, this Secret MUST live in the namespace cert-manager runs
# in (default: cert-manager), because that is the namespace the challenge is
# solved in. For a namespaced Issuer, put it in the Issuer's namespace.
#
# Create the RAM user in the Alibaba Cloud console and attach the
# "AliyunDNSFullAccess" policy (or a custom policy allowing AddDomainRecord,
# DeleteDomainRecord and DescribeSubDomainRecords).
apiVersion: v1
kind: Secret
metadata:
  name: alidns-credentials
  namespace: cert-manager
stringData:
  access-key-id: "LTAI5t_your_access_key_id"
  access-key-secret: "your_access_key_secret"
