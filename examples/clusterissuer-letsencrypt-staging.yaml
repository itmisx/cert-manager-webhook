# Staging Let's Encrypt ClusterIssuer using the AliDNS webhook — for TESTING ONLY.
#
# Staging has very generous rate limits, so use it while you debug the webhook
# and DNS plumbing. Certificates issued here are NOT trusted by browsers (they
# chain to a fake staging root, e.g. "(STAGING) ... YR2"). Once issuance
# succeeds here, switch your Certificate's issuerRef to `letsencrypt-prod`.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: you@example.com
    # Required (cannot be omitted). ACME account private key Secret — you only
    # give the name; cert-manager generates the key on first account registration.
    # Persisting it lets restarts/renewals reuse the same ACME account.
    # This is the account key, NOT the issued cert's key.
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          webhook:
            # Must match the chart's `groupName` and the APIService group.
            groupName: acme.example.com
            # Selects the AliDNS provider (this webhook's solverName).
            solverName: alidns
            config:
              # region is optional; DNS is a global AliDNS service.
              regionId: cn-hangzhou
              ttl: 600
              # Reference to the AccessKey ID: name = Secret name, key = key within it.
              accessKeyIDRef:
                name: alidns-credentials
                key: access-key-id
              # Reference to the AccessKey Secret: name = Secret name, key = key within it.
              accessKeySecretRef:
                name: alidns-credentials
                key: access-key-secret
