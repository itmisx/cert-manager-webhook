name: Release

# Publishes the image and the Helm chart to GitHub Container Registry (GHCR).
# - Every push to a v* tag publishes:
#     ghcr.io/<owner>/cert-manager-webhook:<version> (and :latest)   [image]
#     oci://ghcr.io/<owner>/charts/cert-manager-webhook-dns:<version> [chart]
# - Pushes to main publish the image :edge tag for testing.
# Uses the built-in GITHUB_TOKEN — no extra secrets required for same-repo GHCR.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    # Create a GitHub Release for the pushed tag so it shows up under the repo's
    # "Releases" section with the version name (e.g. v0.0.1) and auto-generated notes.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    # Package the Helm chart and push it to GHCR as an OCI artifact, so users can
    # `helm install oci://...` without cloning the repo. Tags only (charts are
    # versioned by semver).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Derive version and owner
        id: v
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: |
          helm package deploy/cert-manager-webhook-dns \
            --version "${{ steps.v.outputs.version }}" \
            --app-version "${{ steps.v.outputs.version }}"

      - name: Log in to GHCR (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push chart
        run: |
          helm push "cert-manager-webhook-dns-${{ steps.v.outputs.version }}.tgz" \
            "oci://${{ env.REGISTRY }}/${{ steps.v.outputs.owner }}/charts"
